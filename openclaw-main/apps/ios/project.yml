name: Durar
options:
  bundleIdPrefix: ai.Durar
  deploymentTarget:
    iOS: "18.0"
  xcodeVersion: "16.0"

settings:
  base:
    SWIFT_VERSION: "6.0"
    ENABLE_APP_INTENTS_METADATA_GENERATION: NO

packages:
  DurarKit:
    path: ../shared/DurarKit
  Swabble:
    path: ../../Swabble

schemes:
  Durar:
    shared: true
    build:
      targets:
        Durar: all
    test:
      targets:
        - DurarTests
        - DurarLogicTests
  DurarLogicTests:
    shared: true
    build:
      targets:
        DurarLogicTests: all
    test:
      targets:
        - DurarLogicTests

targets:
  Durar:
    type: application
    platform: iOS
    configFiles:
      Debug: Signing.xcconfig
      Release: Signing.xcconfig
    sources:
      - path: Sources
    dependencies:
      - target: DurarShareExtension
        embed: true
      - target: DurarActivityWidget
        embed: true
      - target: DurarWatchApp
      - package: DurarKit
      - package: DurarKit
        product: DurarChatUI
      - package: DurarKit
        product: DurarProtocol
      - package: Swabble
        product: SwabbleKit
      - sdk: AppIntents.framework
    preBuildScripts:
      - name: SwiftFormat (lint)
        basedOnDependencyAnalysis: false
        inputFileLists:
          - $(SRCROOT)/SwiftSources.input.xcfilelist
        script: |
          set -euo pipefail
          export PATH="/opt/homebrew/bin:/usr/local/bin:$PATH"
          if ! command -v swiftformat >/dev/null 2>&1; then
            echo "error: swiftformat not found (brew install swiftformat)" >&2
            exit 1
          fi
          swiftformat --lint --config "$SRCROOT/../../.swiftformat" \
            --filelist "$SRCROOT/SwiftSources.input.xcfilelist"
      - name: SwiftLint
        basedOnDependencyAnalysis: false
        inputFileLists:
          - $(SRCROOT)/SwiftSources.input.xcfilelist
        script: |
          set -euo pipefail
          export PATH="/opt/homebrew/bin:/usr/local/bin:$PATH"
          if ! command -v swiftlint >/dev/null 2>&1; then
            echo "error: swiftlint not found (brew install swiftlint)" >&2
            exit 1
          fi
          swiftlint lint --config "$SRCROOT/.swiftlint.yml" --use-script-input-file-lists
    settings:
      base:
        CODE_SIGN_IDENTITY: "Apple Development"
        CODE_SIGN_ENTITLEMENTS: Sources/Durar.entitlements
        CODE_SIGN_STYLE: "$(Durar_CODE_SIGN_STYLE)"
        DEVELOPMENT_TEAM: "$(Durar_DEVELOPMENT_TEAM)"
        PRODUCT_BUNDLE_IDENTIFIER: "$(Durar_APP_BUNDLE_ID)"
        PROVISIONING_PROFILE_SPECIFIER: "$(Durar_APP_PROFILE)"
        TARGETED_DEVICE_FAMILY: "1"
        SWIFT_VERSION: "6.0"
        SWIFT_STRICT_CONCURRENCY: complete
        SUPPORTS_LIVE_ACTIVITIES: YES
        ENABLE_APPINTENTS_METADATA: NO
        ENABLE_APP_INTENTS_METADATA_GENERATION: NO
      configs:
        Debug:
          Durar_PUSH_TRANSPORT: direct
          Durar_PUSH_DISTRIBUTION: local
          Durar_PUSH_RELAY_BASE_URL: ""
          Durar_PUSH_APNS_ENVIRONMENT: sandbox
        Release:
          Durar_PUSH_TRANSPORT: direct
          Durar_PUSH_DISTRIBUTION: local
          Durar_PUSH_RELAY_BASE_URL: ""
          Durar_PUSH_APNS_ENVIRONMENT: production
    info:
      path: Sources/Info.plist
      properties:
        CFBundleDisplayName: Durar
        CFBundleIconName: AppIcon
        CFBundleURLTypes:
          - CFBundleURLName: ai.Durar.ios
            CFBundleURLSchemes:
              - Durar
        CFBundleShortVersionString: "$(Durar_MARKETING_VERSION)"
        CFBundleVersion: "$(Durar_BUILD_VERSION)"
        UILaunchScreen: {}
        UIApplicationSceneManifest:
          UIApplicationSupportsMultipleScenes: false
        UIBackgroundModes:
          - audio
          - remote-notification
        BGTaskSchedulerPermittedIdentifiers:
          - ai.Durar.ios.bgrefresh
        NSLocalNetworkUsageDescription: Durar discovers and connects to your Durar gateway on the local network.
        NSAppTransportSecurity:
          NSAllowsArbitraryLoadsInWebContent: true
        NSBonjourServices:
          - _Durar-gw._tcp
        NSCameraUsageDescription: Durar can capture photos or short video clips when requested via the gateway.
        NSLocationWhenInUseUsageDescription: Durar uses your location when you allow location sharing.
        NSLocationAlwaysAndWhenInUseUsageDescription: Durar can share your location in the background when you enable Always.
        NSMicrophoneUsageDescription: Durar needs microphone access for voice wake.
        NSMotionUsageDescription: Durar may use motion data to support device-aware interactions and automations.
        NSPhotoLibraryUsageDescription: Durar needs photo library access when you choose existing photos to share with your assistant.
        NSSpeechRecognitionUsageDescription: Durar uses on-device speech recognition for voice wake.
        NSSupportsLiveActivities: true
        ITSAppUsesNonExemptEncryption: false
        DurarPushTransport: "$(Durar_PUSH_TRANSPORT)"
        DurarPushDistribution: "$(Durar_PUSH_DISTRIBUTION)"
        DurarPushRelayBaseURL: "$(Durar_PUSH_RELAY_BASE_URL)"
        DurarPushAPNsEnvironment: "$(Durar_PUSH_APNS_ENVIRONMENT)"
        UISupportedInterfaceOrientations:
          - UIInterfaceOrientationPortrait
          - UIInterfaceOrientationPortraitUpsideDown
          - UIInterfaceOrientationLandscapeLeft
          - UIInterfaceOrientationLandscapeRight
        UISupportedInterfaceOrientations~ipad:
          - UIInterfaceOrientationPortrait
          - UIInterfaceOrientationPortraitUpsideDown
          - UIInterfaceOrientationLandscapeLeft
          - UIInterfaceOrientationLandscapeRight

  DurarShareExtension:
    type: app-extension
    platform: iOS
    configFiles:
      Debug: Signing.xcconfig
      Release: Signing.xcconfig
    sources:
      - path: ShareExtension
    dependencies:
      - package: DurarKit
      - sdk: AppIntents.framework
    settings:
      base:
        CODE_SIGN_IDENTITY: "Apple Development"
        CODE_SIGN_STYLE: "$(Durar_CODE_SIGN_STYLE)"
        DEVELOPMENT_TEAM: "$(Durar_DEVELOPMENT_TEAM)"
        ENABLE_APPINTENTS_METADATA: NO
        ENABLE_APP_INTENTS_METADATA_GENERATION: NO
        PRODUCT_BUNDLE_IDENTIFIER: "$(Durar_SHARE_BUNDLE_ID)"
        PROVISIONING_PROFILE_SPECIFIER: "$(Durar_SHARE_PROFILE)"
        SWIFT_VERSION: "6.0"
        SWIFT_STRICT_CONCURRENCY: complete
    info:
      path: ShareExtension/Info.plist
      properties:
        CFBundleDisplayName: Durar Share
        CFBundleShortVersionString: "$(Durar_MARKETING_VERSION)"
        CFBundleVersion: "$(Durar_BUILD_VERSION)"
        NSExtension:
          NSExtensionPointIdentifier: com.apple.share-services
          NSExtensionPrincipalClass: "$(PRODUCT_MODULE_NAME).ShareViewController"
          NSExtensionAttributes:
            NSExtensionActivationRule:
              NSExtensionActivationSupportsText: true
              NSExtensionActivationSupportsWebURLWithMaxCount: 1
              NSExtensionActivationSupportsImageWithMaxCount: 10
              NSExtensionActivationSupportsMovieWithMaxCount: 1

  DurarActivityWidget:
    type: app-extension
    platform: iOS
    configFiles:
      Debug: Signing.xcconfig
      Release: Signing.xcconfig
    sources:
      - path: ActivityWidget
      - path: Sources/LiveActivity/DurarActivityAttributes.swift
    dependencies:
      - sdk: WidgetKit.framework
      - sdk: ActivityKit.framework
    settings:
      base:
        CODE_SIGN_IDENTITY: "Apple Development"
        CODE_SIGN_STYLE: "$(Durar_CODE_SIGN_STYLE)"
        DEVELOPMENT_TEAM: "$(Durar_DEVELOPMENT_TEAM)"
        PRODUCT_BUNDLE_IDENTIFIER: "$(Durar_ACTIVITY_WIDGET_BUNDLE_ID)"
        SWIFT_VERSION: "6.0"
        SWIFT_STRICT_CONCURRENCY: complete
        SUPPORTS_LIVE_ACTIVITIES: YES
    info:
      path: ActivityWidget/Info.plist
      properties:
        CFBundleDisplayName: Durar Activity
        CFBundleShortVersionString: "$(Durar_MARKETING_VERSION)"
        CFBundleVersion: "$(Durar_BUILD_VERSION)"
        NSSupportsLiveActivities: true
        NSExtension:
          NSExtensionPointIdentifier: com.apple.widgetkit-extension

  DurarWatchApp:
    type: application.watchapp2
    platform: watchOS
    deploymentTarget: "11.0"
    sources:
      - path: WatchApp
    dependencies:
      - target: DurarWatchExtension
    configFiles:
      Debug: Config/Signing.xcconfig
      Release: Config/Signing.xcconfig
    settings:
      base:
        ASSETCATALOG_COMPILER_APPICON_NAME: AppIcon
        ENABLE_APPINTENTS_METADATA: NO
        ENABLE_APP_INTENTS_METADATA_GENERATION: NO
        PRODUCT_BUNDLE_IDENTIFIER: "$(Durar_WATCH_APP_BUNDLE_ID)"
    info:
      path: WatchApp/Info.plist
      properties:
        CFBundleDisplayName: Durar
        CFBundleShortVersionString: "$(Durar_MARKETING_VERSION)"
        CFBundleVersion: "$(Durar_BUILD_VERSION)"
        WKCompanionAppBundleIdentifier: "$(Durar_APP_BUNDLE_ID)"
        WKWatchKitApp: true

  DurarWatchExtension:
    type: watchkit2-extension
    platform: watchOS
    deploymentTarget: "11.0"
    sources:
      - path: WatchExtension/Sources
    dependencies:
      - sdk: AppIntents.framework
      - sdk: WatchConnectivity.framework
      - sdk: UserNotifications.framework
    configFiles:
      Debug: Config/Signing.xcconfig
      Release: Config/Signing.xcconfig
    settings:
      base:
        PRODUCT_BUNDLE_IDENTIFIER: "$(Durar_WATCH_EXTENSION_BUNDLE_ID)"
    info:
      path: WatchExtension/Info.plist
      properties:
        CFBundleDisplayName: Durar
        CFBundleShortVersionString: "$(Durar_MARKETING_VERSION)"
        CFBundleVersion: "$(Durar_BUILD_VERSION)"
        NSExtension:
          NSExtensionAttributes:
            WKAppBundleIdentifier: "$(Durar_WATCH_APP_BUNDLE_ID)"
          NSExtensionPointIdentifier: com.apple.watchkit

  DurarTests:
    type: bundle.unit-test
    platform: iOS
    configFiles:
      Debug: Signing.xcconfig
      Release: Signing.xcconfig
    sources:
      - path: Tests
        excludes:
          - Logic
    dependencies:
      - target: Durar
      - package: Swabble
        product: SwabbleKit
      - sdk: AppIntents.framework
    settings:
      base:
        CODE_SIGN_IDENTITY: "Apple Development"
        CODE_SIGN_STYLE: "$(Durar_CODE_SIGN_STYLE)"
        DEVELOPMENT_TEAM: "$(Durar_DEVELOPMENT_TEAM)"
        PRODUCT_BUNDLE_IDENTIFIER: ai.Durar.ios.tests
        ENABLE_APP_INTENTS_METADATA_GENERATION: NO
        SWIFT_VERSION: "6.0"
        SWIFT_STRICT_CONCURRENCY: complete
        TEST_HOST: "$(BUILT_PRODUCTS_DIR)/Durar.app/Durar"
        BUNDLE_LOADER: "$(TEST_HOST)"
    info:
      path: Tests/Info.plist
      properties:
        CFBundleDisplayName: DurarTests
        CFBundleShortVersionString: "$(Durar_MARKETING_VERSION)"
        CFBundleVersion: "$(Durar_BUILD_VERSION)"

  DurarLogicTests:
    type: bundle.unit-test
    platform: iOS
    configFiles:
      Debug: Signing.xcconfig
      Release: Signing.xcconfig
    sources:
      - path: Tests/Logic
    dependencies:
      - package: DurarKit
    settings:
      base:
        CODE_SIGN_IDENTITY: "Apple Development"
        CODE_SIGN_STYLE: "$(Durar_CODE_SIGN_STYLE)"
        DEVELOPMENT_TEAM: "$(Durar_DEVELOPMENT_TEAM)"
        PRODUCT_BUNDLE_IDENTIFIER: ai.Durar.ios.logic-tests
        ENABLE_APP_INTENTS_METADATA_GENERATION: NO
        SWIFT_VERSION: "6.0"
        SWIFT_STRICT_CONCURRENCY: complete
    info:
      path: Tests/Info.plist
      properties:
        CFBundleDisplayName: DurarLogicTests
        CFBundleShortVersionString: "$(Durar_MARKETING_VERSION)"
        CFBundleVersion: "$(Durar_BUILD_VERSION)"
