name: Publish
on:
  push:
    branches: [ main ]
jobs:
  build-and-publish:
    runs-on: ubuntu-latest
    env:
      NPM_TOKEN: ${{ secrets.NPM_TOKEN }}
    steps:
      - name: Checkout
        uses: actions/checkout@v4
      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: '22.x'
          cache: 'pnpm'
      - name: Install dependencies
        run: pnpm install --no-frozen-lockfile
        env:
          FROZEN_LOCKFILE: "false"
      - name: Build
        run: pnpm build
      - name: Publish to npm
        run: npm publish --ignore-scripts --//registry.npmjs.org/:_authToken=${{ secrets.NPM_TOKEN }}
        env:
          NODE_OPTIONS: --enable-source-maps
