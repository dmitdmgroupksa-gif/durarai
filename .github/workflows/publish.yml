name: Publish
on:
  push:
    branches: [ main ]
jobs:
  build-and-publish:
    runs-on: ubuntu-latest
    env:
      NPM_TOKEN: ${{ secrets.NPM_TOKEN }}
    steps:
      - name: Checkout
        uses: actions/checkout@v4
      - name: Setup PNPM
        run: corepack enable && corepack prepare pnpm@10.32.1 --activate
      - name: Setup Node
        uses: actions/setup-node@v6
        with:
          node-version: '22.x'
          cache: 'pnpm'
      - name: Install dependencies
        run: pnpm install
      - name: Build
        run: pnpm build
        env:
          OPENCLAW_A2UI_SKIP_MISSING: '1'
      - name: Publish to npm
        run: npm publish --ignore-scripts --//registry.npmjs.org/:_authToken=${{ secrets.NPM_TOKEN }}
        env:
          NODE_OPTIONS: --enable-source-maps
